<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AtomSculptor</title>
<link rel="stylesheet" href="__INDEX_CSS__"/>

<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/controls/TransformControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script defer src="__APP_JS__" type="module"></script>
</head>
<body>
<div id="app">
  <div id="header">
    <span class="logo">AtomSculptor</span>
    <span id="aggregator-hint" class="header-pill idle" title="Background note aggregation status">Memory idle</span>
    <span class="status"><span class="dot" id="ws-dot"></span><span id="ws-label">Connecting...</span></span>
  </div>

  <div class="col-divider" id="col-div-0"></div>
  <div class="col-divider" id="col-div-1"></div>
  <div class="col-divider" id="col-div-2"></div>

  <div class="panel" id="panel-todo">
    <div class="panel-hdr"><span>Task Flow</span><button id="btn-refresh-todo" title="Refresh">↻</button></div>
    <div class="panel-body" style="display:flex;flex-direction:column">
      <div id="session-info"></div>
      <div id="todo-graph"></div>
      <div id="todo-empty">No active plan.<br/>Send a message to start.</div>
      <div id="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--s-pending)"></div>Pending</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--s-ready)"></div>Ready</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--s-progress)"></div>In Progress</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--s-done)"></div>Done</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--s-blocked)"></div>Blocked</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--s-deprecated)"></div>Deprecated</div>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-chat">
    <div class="panel-hdr"><span>Chat</span><button id="btn-clear-chat" title="Clear chat">✕</button></div>
    <div class="panel-body" id="chat-scroll"><div id="chat-messages"></div></div>
    <div id="chat-input-area">
      <textarea id="chat-input" rows="1" placeholder="Ask AtomSculptor..."></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <div class="panel" id="panel-struct">
    <div class="panel-hdr">
      <span>Structure</span>
      <span id="struct-file-label" style="font-size:11px;color:var(--text3);font-weight:400;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    </div>
    <div class="panel-body">
      <div id="struct-wrap">
        <div id="edit-toolbar">
          <button class="tb-btn active" id="tb-orbit" data-mode="orbit" data-tip="Orbit (1)">◯</button>
          <button class="tb-btn" id="tb-box" data-mode="box" data-tip="Box Select (2)">⛶</button>
          <button class="tb-btn" id="tb-translate" data-mode="translate" data-tip="Translate (W)">✥</button>
          <button class="tb-btn" id="tb-rotate" data-mode="rotate" data-tip="Rotate (R)">↺</button>
          <button class="tb-btn" id="tb-scale" data-mode="scale" data-tip="Scale (E)">⤡</button>
          <div class="tb-sep"></div>
          <button class="tb-btn" id="tb-add" data-mode="add" data-tip="Add Atom (5)">+</button>
          <button class="tb-btn" id="tb-delete" data-mode="delete" data-tip="Delete (6)">-</button>
          <div class="tb-sep"></div>
          <button class="tb-btn" id="tb-reset" data-tip="Reset View">V</button>
          <button class="tb-btn" id="tb-save" data-tip="Save (Ctrl+S)">💾</button>
        </div>

        <div id="viewer-wrap">
          <canvas id="struct-canvas"></canvas>
          <div id="viewer-empty">Click a structure file<br/>(.cif .xyz .vasp .pdb or POSCAR/CONTCAR) to view</div>
          <div id="add-atom-palette"></div>
          <div id="box-select-overlay"></div>

          <div id="atom-info">
            <div class="ai-title" id="ai-title">Atom</div>
            <div class="ai-row"><span>Symbol</span><span id="ai-sym">-</span></div>
            <div class="ai-row"><span>x</span><span id="ai-x">-</span></div>
            <div class="ai-row"><span>y</span><span id="ai-y">-</span></div>
            <div class="ai-row"><span>z</span><span id="ai-z">-</span></div>
            <div class="ai-count" id="ai-count" style="display:none"></div>
          </div>

          <div id="struct-statusbar">
            <span id="sb-mode">Mode: Orbit</span>
            <span id="sb-natoms">-</span>
            <span id="sb-sel">-</span>
            <span id="sb-hint" style="margin-left:auto;color:var(--text3)"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-files">
    <div class="panel-hdr"><span>Workspace</span><button id="btn-refresh-files" title="Refresh">↻</button></div>
    <div class="panel-body">
      <div id="file-tree"></div>
      <div id="file-empty">No files yet.</div>
    </div>
  </div>
</div>

<div id="tooltip"></div>
</body>
</html>
